<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeIQ - Tradovate Trade Analyzer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&family=DM+Sans&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body {
  background:#09090b;
  color:#f4f4f5;
  font-family:'DM Sans',sans-serif;
  margin:0;
}

.container { max-width:1000px;margin:auto;padding:20px }

.logo { font-family:'Syne';font-weight:800;font-size:22px }

.nav-tag {
  font-size:12px;
  border:1px solid #333;
  padding:4px 10px;
  border-radius:20px;
  color:#aaa;
}

.hero { text-align:center;margin-top:80px }

h1 { font-size:56px;font-family:'Syne'; }

.hero-sub { color:#aaa;max-width:500px;margin:auto }

.drop-wrap {
  border:1px dashed #555;
  padding:40px;
  margin-top:40px;
  cursor:pointer;
}

button {
  background:#e8ff47;
  border:none;
  padding:10px 20px;
  cursor:pointer;
}

.footer-text {
  text-align:center;
  margin-top:80px;
  color:#777;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">
  <nav style="display:flex;justify-content:space-between">
    <div class="logo">TradeIQ</div>
    <div class="nav-tag">TRADOVATE • ALL PROP FIRMS</div>
  </nav>

  <div class="hero">
    <h1>Know why you win or lose</h1>
    <p class="hero-sub">
      Drop your Tradovate CSV. Instantly see what’s working, what’s not, and how to improve your trading.
    </p>

    <div class="drop-wrap" onclick="fileInput.click()">
      Drop CSV here<br><br>
      <button type="button" onclick="fileInput.click()">Browse</button>
      <br><br>
      <button id="demoBtn">Load demo data</button>
    </div>

    <input type="file" id="fileInput" style="display:none" accept=".csv">
  </div>

  <div id="dashboard" style="display:none;margin-top:60px">
    <h2>Results</h2>
    <div id="stats"></div>
    <canvas id="chart" height="120"></canvas>
  </div>

  <div class="footer-text">
    TradeIQ - Tradovate trade analyzer · Powered by AUREL · Parent company of Market Maker Club · No data stored
  </div>
</div>

<script>
let trades=[];

fileInput.addEventListener("change", e=>{
  handleFile(e.target.files[0]);
});

demoBtn.onclick=()=>{
  trades = Array.from({length:50}, (_,i)=>({
    pnl:(Math.random()-0.4)*500
  }));
  render();
};

function handleFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const data=Papa.parse(e.target.result,{header:true}).data;
    trades=data.map(r=>({
      pnl:parseFloat(r["P&L"]||r["pnl"]||0)
    }));
    render();
  };
  reader.readAsText(file);
}

function render(){
  document.getElementById("dashboard").style.display="block";

  const wins=trades.filter(t=>t.pnl>0);
  const losses=trades.filter(t=>t.pnl<0);

  const winRate=(wins.length/trades.length*100||0).toFixed(1);
  const net=trades.reduce((a,b)=>a+b.pnl,0);

  document.getElementById("stats").innerHTML=`
    Net: $${net.toFixed(0)}<br>
    Win rate: ${winRate}%
  `;

  let cum=0;
  const data=trades.map(t=>{
    cum+=t.pnl;
    return cum;
  });

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels:data.map((_,i)=>i),datasets:[{data}]},
    options:{plugins:{legend:{display:false}}}
  });
}
</script>

</body>
</html>
